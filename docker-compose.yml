version: "3.9"

services:

  api:
    build: .
    ports:
      - "8000:8000"

    env_file:
      - .env

    depends_on:
      - redis

  redis:
    image: redis:7-alpine

    ports:
      - "6379:6379"

  postgres:
    image: postgres:16

    environment:
      POSTGRES_DB: ai_backend
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Dutch12345

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data